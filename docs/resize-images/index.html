<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resize Images — RC Tools</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="../" class="back">← RC Tools</a>
    <h1>Resize Images</h1>
    <p class="subtitle">Batch resize images with DPI control, download as ZIP</p>

    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" multiple accept="image/*" />
      <p>Drop images here or <span class="browse">browse</span></p>
      <p class="formats">Any image format</p>
    </div>

    <div id="file-list-preview" class="file-list-preview hidden"></div>

    <div class="settings">
      <div class="setting">
        <label>Resize mode</label>
        <div class="radio-group">
          <label class="radio"><input type="radio" name="mode" value="height" checked /> 1080px tall</label>
          <label class="radio"><input type="radio" name="mode" value="width" /> 1920px wide</label>
        </div>
      </div>
      <div class="setting-row">
        <div class="setting">
          <label for="dpi">DPI</label>
          <input type="number" id="dpi" value="150" min="1" max="1200" />
        </div>
        <div class="setting">
          <label for="quality">Quality <span id="quality-val">90</span>%</label>
          <input type="range" id="quality" min="1" max="100" value="90" />
        </div>
      </div>
      <label class="checkbox">
        <input type="checkbox" id="upscale" />
        Upscale smaller images
      </label>
    </div>

    <button id="resize" type="button" disabled>Resize &amp; Download ZIP</button>

    <div id="progress-area" class="progress-area hidden">
      <div id="results"></div>
      <div id="summary" class="summary hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
