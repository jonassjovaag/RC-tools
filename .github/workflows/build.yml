name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FFMPEG_STATIC_VERSION: b6.1.1

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            ffmpeg_asset: ffmpeg-darwin-arm64.gz
          - target: x86_64-apple-darwin
            ffmpeg_asset: ffmpeg-darwin-x64.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download static ffmpeg
        run: |
          curl -L "https://github.com/eugeneware/ffmpeg-static/releases/download/${{ env.FFMPEG_STATIC_VERSION }}/${{ matrix.ffmpeg_asset }}" -o ffmpeg.gz
          gunzip ffmpeg.gz
          chmod +x ffmpeg
          mv ffmpeg "src-tauri/binaries/ffmpeg-${{ matrix.target }}"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Download static ffmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/eugeneware/ffmpeg-static/releases/download/${{ env.FFMPEG_STATIC_VERSION }}/ffmpeg-win32-x64.gz" -OutFile ffmpeg.gz
          # PowerShell doesn't have gunzip, use .NET
          $input = [System.IO.File]::OpenRead("ffmpeg.gz")
          $output = [System.IO.File]::Create("src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe")
          $gz = New-Object System.IO.Compression.GZipStream($input, [System.IO.Compression.CompressionMode]::Decompress)
          $gz.CopyTo($output)
          $gz.Close(); $input.Close(); $output.Close()

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
